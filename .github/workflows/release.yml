name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build for macOS
    runs-on: macos-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache-dependency-path: task-management/go.sum
          check-latest: true
      
      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-
      
      - name: Install dependencies
        working-directory: ./task-management
        run: |
          go mod download
          go mod verify
      
      - name: Build for macOS Intel
        working-directory: ./task-management
        run: GOOS=darwin GOARCH=amd64 go build -v -o task-skill-darwin-amd64 .
      
      - name: Build for macOS Apple Silicon
        working-directory: ./task-management
        run: GOOS=darwin GOARCH=arm64 go build -v -o task-skill-darwin-arm64 .
      
      - name: Create Release Assets
        run: |
          cd task-management
          # 创建校验和
          shasum -a 256 task-skill-darwin-amd64 > task-skill-darwin-amd64.sha256
          shasum -a 256 task-skill-darwin-arm64 > task-skill-darwin-arm64.sha256
      
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            task-management/task-skill-darwin-amd64
            task-management/task-skill-darwin-arm64
            task-management/task-skill-darwin-amd64.sha256
            task-management/task-skill-darwin-arm64.sha256
          name: Release ${{ github.ref_name }}
          body: |
            ## 更新内容
            - 完善任务状态系统
            - 添加审核意见功能
            - 优化 Web 界面
          draft: false
          prerelease: true
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
