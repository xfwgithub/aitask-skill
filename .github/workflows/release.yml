name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build for macOS
    runs-on: macos-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache-dependency-path: task-management/go.sum
          check-latest: true
      
      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-
      
      - name: Install dependencies
        working-directory: ./skills/task-management
        run: |
          go mod download
          go mod verify
      
      - name: Build for macOS Apple Silicon
        working-directory: ./skills/task-management
        run: GOOS=darwin GOARCH=arm64 go build -v -ldflags "-s -w -X main.version=${{ github.ref_name }}" -o task-skill .
      
      - name: Create Release Assets
        run: |
          cd skills/task-management
          
          # 创建校验和
          shasum -a 256 task-skill > task-skill.sha256
          
          # 创建zip包（为兼容旧版本下载逻辑）
          mkdir -p task-skill-${{ github.ref_name }}
          cp task-skill task-skill-${{ github.ref_name }}/
          cp SKILL.md task-skill-${{ github.ref_name }}/
          zip -r task-skill-${{ github.ref_name }}.zip task-skill-${{ github.ref_name }}/
          shasum -a 256 task-skill-${{ github.ref_name }}.zip > task-skill-${{ github.ref_name }}.zip.sha256
      
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            skills/task-management/task-skill
            skills/task-management/task-skill.sha256
            skills/task-management/task-skill-${{ github.ref_name }}.zip
            skills/task-management/task-skill-${{ github.ref_name }}.zip.sha256
          name: Release ${{ github.ref_name }}
          body: |
            ## 更新内容
            - 移除 Python/pip 依赖，采用 Go go:embed 静态编译单文件分发
            - 完美解决安装版本不同步和重复下载问题
            - Web 静态资源内置，真正的绿色免安装单文件！
            
            ## 下载说明
            
            **推荐安装方式（macOS ARM64）**：
            
            ```bash
            sudo curl -sL https://github.com/xfwgithub/aitask-skill/releases/latest/download/task-skill -o /usr/local/bin/task-skill
            sudo chmod +x /usr/local/bin/task-skill
            ```
            
            **验证安装**:
            ```bash
            task-skill --version
            ```
          draft: false
          prerelease: true
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
