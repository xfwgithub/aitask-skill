name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build for macOS
    runs-on: macos-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache-dependency-path: task-management/go.sum
      
      - name: Install dependencies
        working-directory: ./task-management
        run: go mod download
      
      - name: Build for macOS Intel
        working-directory: ./task-management
        run: GOOS=darwin GOARCH=amd64 go build -o task-skill-darwin-amd64 .
      
      - name: Build for macOS Apple Silicon
        working-directory: ./task-management
        run: GOOS=darwin GOARCH=arm64 go build -o task-skill-darwin-arm64 .
      
      - name: Create Release Assets
        run: |
          cd task-management
          # 创建校验和
          shasum -a 256 task-skill-darwin-amd64 > task-skill-darwin-amd64.sha256
          shasum -a 256 task-skill-darwin-arm64 > task-skill-darwin-arm64.sha256
      
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            task-management/task-skill-darwin-amd64
            task-management/task-skill-darwin-arm64
            task-management/task-skill-darwin-amd64.sha256
            task-management/task-skill-darwin-arm64.sha256
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
