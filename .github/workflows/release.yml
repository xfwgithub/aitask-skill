name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build for macOS
    runs-on: macos-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache-dependency-path: task-management/go.sum
          check-latest: true
      
      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-
      
      - name: Install dependencies
        working-directory: ./skills/task-management
        run: |
          go mod download
          go mod verify
      
      - name: Build for macOS Apple Silicon
        working-directory: ./skills/task-management
        run: GOOS=darwin GOARCH=arm64 go build -v -o task-skill .
      
      - name: Create Release Assets
        run: |
          cd skills/task-management
          
          # 创建完整包
          mkdir -p task-skill-${{ github.ref_name }}
          cp task-skill task-skill-${{ github.ref_name }}/
          cp -r templates static SKILL.md task-skill-${{ github.ref_name }}/
          zip -r task-skill-${{ github.ref_name }}.zip task-skill-${{ github.ref_name }}/
          
          # 创建校验和
          shasum -a 256 task-skill > task-skill.sha256
          shasum -a 256 task-skill-${{ github.ref_name }}.zip > task-skill-${{ github.ref_name }}.zip.sha256
      
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            skills/task-management/task-skill
            skills/task-management/task-skill.sha256
            skills/task-management/task-skill-${{ github.ref_name }}.zip
            skills/task-management/task-skill-${{ github.ref_name }}.zip.sha256
          name: Release ${{ github.ref_name }}
          body: |
            ## 更新内容
            - 完善任务状态系统
            - 添加审核意见功能
            - 优化 Web 界面
            - 添加项目字段支持
            - 添加任务编辑功能
            
            ## 下载说明
            
            **推荐使用完整包（包含 Web 界面资源）**：
            - `task-skill-${{ github.ref_name }}.zip` - Apple Silicon Mac (ARM64)
            
            **纯二进制文件**（仅命令行使用）：
            - `task-skill` - Apple Silicon Mac (ARM64)
            
            ## 安装方法
            
            ```bash
            # 下载并解压
            unzip task-skill-${{ github.ref_name }}.zip
            mv task-skill-${{ github.ref_name }} ~/.agents/skills/task-management
            
            # 运行
            cd ~/.agents/skills/task-management
            ./task-skill --server
            ```
          draft: false
          prerelease: true
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
