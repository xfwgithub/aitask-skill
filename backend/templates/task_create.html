<article style="max-width:600px;">
    <header>
        <h3>➕ 创建任务</h3>
        <button onclick="closeModal()" style="float:right;">×</button>
    </header>
    
    <form hx-post="/api/tasks"
          hx-target="#task-list"
          hx-swap="afterbegin"
          hx-on::after-request="closeModal()">
        
        <label>
            任务标题 *
            <input type="text" name="title" required placeholder="输入任务标题">
        </label>
        
        <label>
            任务描述
            <textarea name="description" rows="4" placeholder="任务描述..."></textarea>
        </label>
        
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:1rem;">
            <label>
                优先级
                <select name="priority">
                    <option value="4">低 (4)</option>
                    <option value="3" selected>中 (3)</option>
                    <option value="2">高 (2)</option>
                    <option value="1">紧急 (1)</option>
                </select>
            </label>
            
            <label>
                负责人
                <input type="text" name="assignee_name" placeholder="用户名">
            </label>
        </div>
        
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:1rem;">
            <label>
                Agent 类型
                <select name="agent_type">
                    <option value="">不使用 Agent</option>
                    <option value="writer">Writer</option>
                    <option value="reviewer">Reviewer</option>
                    <option value="researcher">Researcher</option>
                </select>
            </label>
            
            <label>
                Agent 模型
                <input type="text" name="agent_model" placeholder="qwen3.5-plus" value="qwen3.5-plus">
            </label>
        </div>
        
        <label>
            标签（逗号分隔）
            <input type="text" name="tags" placeholder="标签 1，标签 2">
        </label>
        
        <footer>
            <button type="submit">创建任务</button>
            <button type="button" onclick="closeModal()" style="background:var(--muted-color);">取消</button>
        </footer>
    </form>
</article>

<script>
function closeModal() {
    document.getElementById('modal-container').innerHTML = '';
}
</script>
