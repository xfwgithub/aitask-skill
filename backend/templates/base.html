<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}任务管理系统{% endblock %}</title>
    
    <!-- PicoCSS - 轻量级 CSS 框架 -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
    
    <!-- 自定义样式 -->
    <link rel="stylesheet" href="/static/css/style.css">
    
    <!-- HTMX -->
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    
    {% block extra_head %}{% endblock %}
</head>
<body>
    <!-- 侧边栏 -->
    <nav class="sidebar">
        <h3 style="margin-bottom: 2rem;">📋 任务管理</h3>
        <a href="/" class="nav-link {% if page == 'dashboard' %}active{% endif %}">
            📊 仪表盘
        </a>
        <a href="/tasks" class="nav-link {% if page == 'tasks' %}active{% endif %}">
            ✅ 任务列表
        </a>
        <a href="/projects" class="nav-link {% if page == 'projects' %}active{% endif %}">
            📁 项目管理
        </a>
        <hr>
        <small style="color: var(--muted-color);">
            v1.0.0
        </small>
    </nav>
    
    <!-- 主内容区 -->
    <main class="main-content">
        {% block content %}{% endblock %}
    </main>
    
    <!-- HTMX 提示 -->
    <div id="htmx-loading" 
         style="display:none; position:fixed; top:1rem; right:1rem; background:var(--primary-color); color:white; padding:0.5rem 1rem; border-radius:8px; z-index:9999;">
        加载中...
    </div>
    
    <!-- 自定义脚本 -->
    <script src="/static/js/app.js"></script>
    
    {% block extra_scripts %}{% endblock %}
</body>
</html>
