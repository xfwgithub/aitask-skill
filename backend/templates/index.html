{% extends "base.html" %}

{% block title %}仪表盘 - 任务管理系统{% endblock %}

{% block page %}dashboard{% endblock %}

{% block content %}
<h1>📊 仪表盘</h1>

<!-- 统计卡片 -->
<div class="stats-grid" 
     hx-get="/api/stats/dashboard"
     hx-trigger="load"
     hx-swap="innerHTML">
    <div class="loading">加载中...</div>
</div>

<!-- 最近任务 -->
<article>
    <header>
        <h3>📝 最近任务</h3>
        <a href="/tasks" style="float:right;">查看全部 →</a>
    </header>
    
    <div id="recent-tasks"
         hx-get="/api/tasks?limit=5"
         hx-trigger="load"
         hx-swap="innerHTML">
        <div class="loading">加载中...</div>
    </div>
</article>

<!-- 待处理任务 -->
<article>
    <header>
        <h3>⏳ 待处理任务</h3>
    </header>
    
    <div id="pending-tasks"
         hx-get="/api/tasks?status=pending&limit=5"
         hx-trigger="load"
         hx-swap="innerHTML">
        <div class="loading">加载中...</div>
    </div>
</article>
{% endblock %}

{% block extra_scripts %}
<script>
// 仪表盘统计
function updateStats(data) {
    document.getElementById('dashboard-stats').innerHTML = `
        <div class="stat-card">
            <div class="stat-number">${data.total}</div>
            <div class="stat-label">总任务数</div>
        </div>
        <div class="stat-card">
            <div class="stat-number">${data.pending}</div>
            <div class="stat-label">待处理</div>
        </div>
        <div class="stat-card">
            <div class="stat-number">${data.agent_working}</div>
            <div class="stat-label">Agent 执行中</div>
        </div>
        <div class="stat-card">
            <div class="stat-number">${data.done}</div>
            <div class="stat-label">已完成</div>
        </div>
    `;
}
</script>
{% endblock %}
